name: CI — RepairMate

on:
  push:
    branches: [ main, dev-back, dev-front ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-check:
    name: Vérification syntaxique
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances
        working-directory: backend
        run: npm ci --omit=dev

      - name: Vérification syntaxique de tous les fichiers JS
        working-directory: backend
        run: |
          for f in server.js db.js controllers/*.js routes/*.js middleware/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done
          echo "✅ Tous les fichiers sont syntaxiquement corrects."

      - name: Vérification qu'aucun .env n'est commité
        run: |
          if git ls-files | grep -q "^\.env$"; then
            echo "❌ ERREUR : le fichier .env est présent dans le dépôt !"
            exit 1
          fi
          echo "✅ Aucun fichier .env sensible trouvé."

      - name: Vérification qu'aucun mot de passe n'est en clair
        run: |
          if git log --all -p | grep -i "password.*=.*['\"][^'\"]\{6,\}" > /dev/null 2>&1; then
            echo "⚠ Attention : vérifiez les commits pour des mots de passe en clair."
          fi
          echo "✅ Vérification sécurité OK."
